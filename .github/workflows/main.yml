name: Daily Turtle Trading Report

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 한국 시간 익일 오전 7:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies with compatible numpy version
      run: |
        pip install --upgrade pip
        # 먼저 numpy 1.26.4 설치 (pandas-ta 호환성 보장)
        pip install numpy==1.26.4
        # 그 후 나머지 패키지 설치
        pip install yfinance pandas pandas-ta lxml

    - name: Run Python script
      env:
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      run: |
        python final_report_script.py
